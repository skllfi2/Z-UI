name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore Z-UI.slnx

    - name: Build
      run: dotnet build Z-UI.slnx --configuration Release --no-restore

    - name: Publish
      run: dotnet publish Z-UI/Z-UI.csproj -c Release -r win-x64 --self-contained true -o ./publish
